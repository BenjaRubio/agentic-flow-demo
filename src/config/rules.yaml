# Decision table for ticket classification.
#
# Derived (by hand, once, by reading the source docs) from:
#   - dataset/docs/sla_matrix.md          (Version 1.0, Active)
#   - dataset/docs/escalation_policy.md   (Version 1.3, Active)
#   - dataset/docs/policy_v2_shipping.md  (Version 2.0, Active)
#   - dataset/docs/pricing_notes_current.md (Active)
#
# This is read by deterministic Python code (tools/common/decision_table.py),
# NOT by an LLM at runtime. It is fully auditable. Verified to reproduce 100%
# of the priority/escalation labels in tickets_train.jsonl.

# policy_v2_shipping.md: auto-answer only if confidence >= 0.80 with evidence.
confidence_threshold: 0.80

# SLA response targets (sla_matrix.md), for reference in drafted responses.
sla_response_target:
  high: "30 minutes"
  medium: "4 hours"
  low: "1 business day"

# Base mapping: ticket type -> priority / escalation / next action.
# next_action is either "auto_respond" or "route:<team>".
types:
  tracking_request:
    priority: low
    human_escalation: false
    next_action: auto_respond
  document_request:
    priority: low
    human_escalation: false
    next_action: auto_respond
  pricing_dispute:
    priority: medium
    human_escalation: true
    next_action: "route:pricing_operations"
  shipment_exception:
    priority: high
    human_escalation: true
    next_action: "route:operations_lead"
  temperature_exception:
    priority: high
    human_escalation: true
    next_action: "route:operations_lead"
  legal_sensitive:
    priority: high
    human_escalation: true
    next_action: "route:compliance"

# Fallback when type is unknown / very low confidence: be conservative.
default:
  priority: medium
  human_escalation: true
  next_action: "route:operations_lead"

# Human escalation routing targets (escalation_policy.md).
routing_targets:
  pricing_operations: "Pricing operations"
  operations_lead: "Operations lead"
  compliance: "Compliance"

# Priority order (used for min_priority bumps).
priority_order: [low, medium, high]

# Feature triggers detected in the ticket text (keyword/substring match).
# They can force escalation and/or raise a minimum priority, regardless of the
# predicted type. This captures cases the type alone may miss (e.g. a delay that
# mentions financial loss). Triggers never LOWER an existing decision.
triggers:
  # escalation_policy.md: escalate immediately for these.
  customs_retention:
    keywords: ["customs"]
    min_priority: high
    force_escalation: true
    route: operations_lead
  # policy_v2_shipping.md: any urgent request involving delay must be escalated
  # for human review. We err toward escalation for delays (safety-first).
  delay:
    keywords: ["delay", "delayed"]
    min_priority: high
    force_escalation: true
    route: operations_lead
  temperature:
    keywords: ["reefer", "temperature", "refrigerated", "cold chain", "perishable"]
    min_priority: high
    force_escalation: true
    route: operations_lead
  legal:
    keywords: ["liability", "contract", "contractual", "legal", "clause", "agreement"]
    min_priority: high
    force_escalation: true
    route: compliance
  regulated_cargo:
    keywords: ["regulated", "hazardous", "dangerous goods", "restricted"]
    min_priority: high
    force_escalation: true
    route: compliance
  # pricing_notes_current.md: issues affecting customer expectation / service
  # continuity => at least Medium priority.
  service_continuity:
    keywords: ["lose", "loss", "missed", "supermarket slot", "shelf", "penalty", "deadline", "tomorrow"]
    min_priority: medium
    force_escalation: false
