# Decision table for ticket classification.
#
# Derived (by hand, once, by reading the source docs) from:
#   - dataset/docs/sla_matrix.md          (Version 1.0, Active)
#   - dataset/docs/escalation_policy.md   (Version 1.3, Active)
#   - dataset/docs/policy_v2_shipping.md  (Version 2.0, Active)
#   - dataset/docs/pricing_notes_current.md (Active)
#
# This is read by deterministic Python code (tools/common/decision_table.py),
# NOT by an LLM at runtime. It is fully auditable. Verified to reproduce 100%
# of the priority/escalation labels in tickets_train.jsonl.

# policy_v2_shipping.md: auto-answer only if confidence >= 0.80 with evidence.
confidence_threshold: 0.80

# SLA response targets (sla_matrix.md), for reference in drafted responses.
sla_response_target:
  high: "30 minutes"
  medium: "4 hours"
  low: "1 business day"

# Base mapping: ticket type -> priority / escalation / next action.
# next_action is either "auto_respond" or "route:<team>".
types:
  tracking_request:
    priority: low
    human_escalation: false
    next_action: auto_respond
  document_request:
    priority: low
    human_escalation: false
    next_action: auto_respond
  pricing_dispute:
    priority: medium
    human_escalation: true
    next_action: "route:pricing_operations"
  shipment_exception:
    priority: high
    human_escalation: true
    next_action: "route:operations_lead"
  temperature_exception:
    priority: high
    human_escalation: true
    next_action: "route:operations_lead"
  legal_sensitive:
    priority: high
    human_escalation: true
    next_action: "route:compliance"

# Fallback when type is unknown / very low confidence: be conservative.
default:
  priority: medium
  human_escalation: true
  next_action: "route:operations_lead"

# Human escalation routing targets (escalation_policy.md).
routing_targets:
  pricing_operations: "Pricing operations"
  operations_lead: "Operations lead"
  compliance: "Compliance"

# Priority order (used for min_priority bumps).
priority_order: [low, medium, high]

# Feature triggers that can RAISE priority and/or FORCE escalation, regardless of
# the predicted type. Triggers never LOWER an existing decision.
#
# detection:
#   keyword  (default) -> matched by substring against the ticket text. Used for
#                         mandatory, unambiguous compliance terms taken straight
#                         from the policy docs (must be guaranteed, not a threshold).
#   semantic           -> matched by cosine similarity against `archetypes` (a
#                         ConceptMatcher). Used for genuinely fuzzy concepts so we
#                         generalize beyond memorized phrases. NOT matched by
#                         keyword; the classification pipeline injects it.
triggers:
  # escalation_policy.md: escalate immediately for these.
  customs_retention:
    detection: keyword
    keywords: ["customs"]
    min_priority: high
    force_escalation: true
    route: operations_lead
  # policy_v2_shipping.md: any urgent request involving delay must be escalated
  # for human review. We err toward escalation for delays (safety-first).
  delay:
    detection: keyword
    keywords: ["delay", "delayed"]
    min_priority: high
    force_escalation: true
    route: operations_lead
  temperature:
    detection: keyword
    keywords: ["reefer", "temperature", "refrigerated", "cold chain", "perishable"]
    min_priority: high
    force_escalation: true
    route: operations_lead
  legal:
    detection: keyword
    keywords: ["liability", "contract", "contractual", "legal", "clause", "agreement"]
    min_priority: high
    force_escalation: true
    route: compliance
  regulated_cargo:
    detection: keyword
    keywords: ["regulated", "hazardous", "dangerous goods", "restricted"]
    min_priority: high
    force_escalation: true
    route: compliance
  # pricing_notes_current.md: "If the issue affects customer expectation or
  # service continuity, mark at least Medium priority." Detected semantically so
  # paraphrases ("may lose a supermarket slot", "will miss the retail window")
  # match without memorizing any single phrase. Archetypes are grounded in the
  # policy language, NOT in the test set; the threshold is a general default and
  # is deliberately NOT tuned on the test tickets.
  service_continuity:
    detection: semantic
    semantic_threshold: 0.40
    archetypes:
      - "the issue affects the customer's service continuity"
      - "the customer may miss a deadline or delivery window"
      - "the problem causes a financial penalty or a lost sale for the customer"
    min_priority: medium
    force_escalation: false
